apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-api
  labels:
    app: spring-api
spec:
  selector:
    matchLabels:
      app: spring-api-container
  replicas: 1
  template:
    metadata:
      labels:
        app: spring-api-container
    spec:
      containers:
        - name: spring-api-container
          image: "gianmilani/app-spring-test:v5.1"
          env:
          - name: TEST_USER_NAME
            value: "Joseph Climber"
          - name : TEST_USER_AGE
            valueFrom:
              configMapKeyRef:
                name: api-spring-env
                key: TEST_USER_AGE
          envFrom:
            - configMapRef:
                name: configmap-list-fruit
            - secretRef:
                name: app-spring-secret
          volumeMounts:
            - mountPath: "/usr/app/config"
              name: config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: configmap-server-info
            items:
            - key: info
              path: ".env"  